name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Verify workspace
        uses: ./.github/actions/verify-workspace

      - name: Verify npm publish dry-run
        run: pnpm run publish:npm-trusted -- --dry-run

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: verify
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Show npm version
        run: npm --version

      - name: Build workspace
        run: pnpm build

      - name: Publish npm packages
        run: pnpm run publish:npm-trusted
