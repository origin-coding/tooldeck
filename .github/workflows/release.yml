name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Verify workspace
        uses: ./.github/actions/verify-workspace

      - name: Verify npm publish dry-run
        run: pnpm run publish:npm-trusted -- --dry-run

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: verify
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Show npm version
        run: npm --version

      - name: Build workspace
        run: pnpm build

      - name: Publish npm packages
        run: pnpm run publish:npm-trusted

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists; skipping."
          else
            gh release create "$RELEASE_TAG" \
              --repo "$RELEASE_REPOSITORY" \
              --title "Tooldeck $RELEASE_TAG" \
              --generate-notes \
              --latest
          fi
