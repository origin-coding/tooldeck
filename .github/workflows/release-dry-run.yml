name: Release dry-run

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  verify:
    name: Verify release dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Verify workspace
        uses: ./.github/actions/verify-workspace

  npm-dry-run:
    name: Verify npm publish dry-run
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Build
        run: pnpm build

      - name: npm publish dry-run
        run: pnpm run publish:npm-trusted -- --dry-run
