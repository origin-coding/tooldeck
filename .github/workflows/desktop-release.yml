name: Desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<apps/desktop package version>."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build-windows:
    name: Build Windows NSIS and MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Build workspace
        run: pnpm build

      - name: Stage builtin plugins
        run: pnpm builtin-plugins:stage -- --out apps/desktop/.vite/builtin-plugins --skip-build

      - name: Build Windows packages
        run: pnpm --filter @tooldeck/desktop exec electron-builder --win --publish never

      - name: Upload Windows packages
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/*.msi
            apps/desktop/release/latest.yml

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Build workspace
        run: pnpm build

      - name: Stage builtin plugins
        run: pnpm builtin-plugins:stage -- --out apps/desktop/.vite/builtin-plugins --skip-build

      - name: Build Linux packages
        run: pnpm --filter @tooldeck/desktop exec electron-builder --linux AppImage --publish never

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
            apps/desktop/release/latest-linux.yml

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm

      - name: Build workspace
        run: pnpm build

      - name: Stage builtin plugins
        run: pnpm builtin-plugins:stage -- --out apps/desktop/.vite/builtin-plugins --skip-build

      - name: Build macOS package
        run: pnpm --filter @tooldeck/desktop exec electron-builder --mac dmg --publish never

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos
          if-no-files-found: error
          path: apps/desktop/release/*.dmg

  publish-desktop-release:
    name: Publish desktop release assets
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-macos
    environment: desktop-production
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            version="$(node -p "require('./apps/desktop/package.json').version")"
            tag="v${version}"
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "::error::Release tag $tag does not exist. Create and push the tag before publishing desktop assets."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=Tooldeck Desktop $tag" >> "$GITHUB_OUTPUT"

      - name: List release assets
        shell: bash
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --repo "$RELEASE_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$RELEASE_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --generate-notes \
              --latest \
              --verify-tag
          fi
